syntax = "proto2";
import "command_deck_select.proto";

// Types of draft gamemodes available
enum Draft_Type {
    Booster_Draft = 1;
    Sealed = 2;
}

// Container for options related to drafting shared in the game state
message Draft_Options {
    // The draft gamemode
    optional Draft_Type type = 1;

    // The cards to draft from as cockatrice decklist
    optional string draft_list = 2;

    // The cards to draft from as a decklist stored on the server
    optional sint32 draft_list_id = 3 [default = -1];

    // The cards that can be freely added to the deck before deck submission
    optional string addable_card_list = 4;

    // The amount of cards in each pack when using a cube, often 15
    optional uint32 cards_per_pack = 5;

    // The amount of packs that will be drafted by each player when using a cube, often 3
    optional uint32 packs_per_player = 6;

    // The minimum amount of cards in the mainboard of submitted decklists, often 40, -1 means any size
    optional sint32 minimum_deck_size = 7 [default = -1];

    // The amount of cards to pick every time a pack is passed, usually 1
    optional uint32 picks_per_selection = 8 [default = 1];

    // The amount of cards picked for removal every time a pack is passed, usually 0
    optional uint32 burns_per_selection = 9;

    // Amount of seconds before the server will decide picks automatically, -1 means no limit
    optional sint32 selection_timer = 10 [default = -1];

    // Amount of packs that can be picked from and passed without having to wait on other players, -1 means to never
    // wait, 0 means to wait for all players to confirm their picks before showing the next pack
    optional sint32 max_selections_ahead = 11 [default = -1];

    // Amount of packs that can be opened without having to wait on other players after all that player's packs have
    // been picked from and passed, -1 means to never wait, 0 means to wait for all players to finish their packs before
    // showing the next pack when the player finished all picks
    optional sint32 max_new_packs_ahead = 12 [default = -1];

    // Allow players to interact using normal card actions on a table zone
    optional bool enable_table = 32;

    // Allow players to take more or less cards from packs with confirmation
    optional bool enable_overpicking = 33;

    // Allow players to return cards back into a pack with confirmation
    optional bool enable_returning = 34;
}
