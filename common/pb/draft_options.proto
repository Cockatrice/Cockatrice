syntax = "proto2";
import "command_deck_select.proto"
enum Draft_Type {
    Booster_Draft = 1;
    Sealed = 2;
}

message Draft_Options {
    optional Draft_Type type = 1;
    optional string draft_list = 2;
    optional sint32 draft_list_id = 3 [default = -1];
    optional string addable_card_list = 4;
    optional sint32 cards_per_pack = 5 [default = -1];
    optional sint32 packs_per_player = 6 [default = -1];
    optional sint32 minimum_deck_size = 7 [default = -1];
    optional sint32 picks_per_round = 8 [default = 1];
    optional sint32 burns_per_round = 9;
    optional sint32 round_timer = 10 [default = -1];
    optional sint32 asynchronous_cards = 11 [default = -1];
    optional sint32 asynchronous_packs = 12 [default = -1];
    optional bool enable_table = 32;
    optional bool enable_overpicking = 33;
    optional bool enable_returning = 34;
}
